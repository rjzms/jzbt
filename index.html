<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>卡片背题</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#fff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --brand:#2563eb;
      --brand2:#7c3aed;
      --soft:#eef2ff;
      --ok:#16a34a;
      --shadow:0 18px 45px rgba(15,23,42,.10);
      --radius:24px;
    }

    *{box-sizing:border-box}

    html{
      height:100%;
      -webkit-text-size-adjust:100%;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left,rgba(37,99,235,.15),transparent 34%),
        radial-gradient(circle at top right,rgba(124,58,237,.13),transparent 30%),
        var(--bg);
    }

    button,input,select{
      font:inherit;
    }

    button{
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      border:0;
      border-radius:16px;
      padding:12px 14px;
      font-size:14px;
      font-weight:700;
      background:#fff;
      color:var(--text);
      box-shadow:inset 0 0 0 1px var(--line);
      transition:transform .12s ease,background .12s ease,opacity .12s ease;
    }

    button:active{
      transform:scale(.97);
    }

    .app{
      width:min(760px,100%);
      margin:0 auto;
      padding:16px 12px 104px;
    }

    .top{
      position:sticky;
      top:0;
      z-index:5;
      padding:8px 0 12px;
      backdrop-filter:blur(16px);
      background:linear-gradient(to bottom,rgba(246,247,251,.96),rgba(246,247,251,.78));
    }

    .hero{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }

    h1{
      margin:0 0 4px;
      font-size:22px;
      line-height:1.2;
      letter-spacing:-.02em;
    }

    .sub{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
    }

    .pill{
      white-space:nowrap;
      font-size:12px;
      padding:8px 10px;
      border-radius:999px;
      color:#fff;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      box-shadow:0 8px 18px rgba(37,99,235,.25);
    }

    .panel{
      background:rgba(255,255,255,.80);
      border:1px solid rgba(229,231,235,.9);
      border-radius:22px;
      padding:10px;
      box-shadow:0 8px 24px rgba(15,23,42,.06);
    }

    .row{
      display:flex;
      align-items:center;
      gap:8px;
    }

    select,input[type="search"]{
      width:100%;
      border:1px solid var(--line);
      outline:none;
      background:#fff;
      color:var(--text);
      border-radius:14px;
      padding:11px 12px;
      font-size:14px;
    }

    input[type="search"]{
      margin-top:8px;
    }

    .mini-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:8px;
    }

    .toggle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      border:1px solid var(--line);
      background:#fff;
      border-radius:16px;
      padding:9px 10px;
      font-size:13px;
      color:var(--text);
      box-shadow:none;
    }

    .switch{
      width:42px;
      height:24px;
      border-radius:999px;
      background:#d1d5db;
      position:relative;
      flex:0 0 auto;
      transition:.18s;
    }

    .switch::after{
      content:"";
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      position:absolute;
      top:2px;
      left:2px;
      box-shadow:0 2px 8px rgba(0,0,0,.18);
      transition:.18s;
    }

    .toggle.active{
      color:var(--brand);
      border-color:rgba(37,99,235,.25);
      background:#f8faff;
      font-weight:700;
    }

    .toggle.active .switch{
      background:linear-gradient(135deg,var(--brand),var(--brand2));
    }

    .toggle.active .switch::after{
      left:20px;
    }

    .tabs{
      display:flex;
      gap:8px;
      overflow:auto;
      padding:10px 2px 2px;
      scrollbar-width:none;
    }

    .tabs::-webkit-scrollbar{
      display:none;
    }

    .tab{
      padding:9px 13px;
      border-radius:999px;
      background:#fff;
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      box-shadow:inset 0 0 0 1px var(--line);
    }

    .tab.active{
      background:var(--soft);
      color:var(--brand);
      box-shadow:inset 0 0 0 1px rgba(37,99,235,.18);
      font-weight:800;
    }

    .file-line{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:8px;
      color:var(--muted);
      font-size:12px;
    }

    .file-line input{
      width:100%;
      font-size:12px;
    }

    .status{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin:12px 4px 10px;
      color:var(--muted);
      font-size:12px;
    }

    .bar{
      height:7px;
      background:#e9eefb;
      border-radius:999px;
      overflow:hidden;
      flex:1;
    }

    .bar span{
      display:block;
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--brand),var(--brand2));
      border-radius:999px;
      transition:.25s;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(229,231,235,.95);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:20px;
      min-height:390px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      touch-action:pan-y;
    }

    .badge-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      width:max-content;
      gap:6px;
      padding:7px 11px;
      border-radius:999px;
      font-size:12px;
      color:var(--brand);
      background:var(--soft);
      font-weight:800;
    }

    .small-tip{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .q{
      margin:24px 0 22px;
      font-size:22px;
      line-height:1.52;
      font-weight:850;
      letter-spacing:-.02em;
      white-space:pre-wrap;
    }

    .answer{
      display:none;
      border-top:1px dashed var(--line);
      padding-top:16px;
      margin-top:8px;
    }

    .answer.show{
      display:block;
      animation:fade .18s ease-out;
    }

    @keyframes fade{
      from{opacity:.25;transform:translateY(4px)}
      to{opacity:1;transform:none}
    }

    .ans-title{
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:800;
    }

    .ans-text{
      font-size:17px;
      line-height:1.75;
      white-space:pre-wrap;
    }

    .desc{
      margin-top:12px;
      padding:12px;
      border-radius:16px;
      background:#f8fafc;
      color:#4b5563;
      font-size:13px;
      line-height:1.55;
      white-space:pre-wrap;
    }

    .tools{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:18px;
    }

    .tools button{
      padding:13px 10px;
      border-radius:16px;
      font-size:15px;
    }

    .master.active{
      color:var(--ok);
      background:#f0fdf4;
      box-shadow:inset 0 0 0 1px rgba(22,163,74,.28);
    }

    .primary{
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:#fff;
      box-shadow:0 10px 22px rgba(37,99,235,.22);
    }

    .empty{
      padding:42px 14px;
      text-align:center;
      color:var(--muted);
      line-height:1.8;
    }

    .bottom{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:10;
      padding:10px 14px max(10px,env(safe-area-inset-bottom));
      background:rgba(246,247,251,.88);
      backdrop-filter:blur(18px);
      border-top:1px solid rgba(229,231,235,.9);
    }

    .bottom-inner{
      width:min(760px,100%);
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 1.1fr 1fr;
      gap:8px;
    }

    .bottom button{
      padding:13px 8px;
      border-radius:18px;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:88px;
      z-index:20;
      transform:translateX(-50%) translateY(12px);
      background:rgba(17,24,39,.92);
      color:#fff;
      padding:9px 13px;
      border-radius:999px;
      font-size:13px;
      opacity:0;
      pointer-events:none;
      transition:.18s;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media(max-width:420px){
      .app{
        padding-left:10px;
        padding-right:10px;
      }

      h1{
        font-size:20px;
      }

      .q{
        font-size:20px;
      }

      .card{
        min-height:365px;
        padding:18px;
      }

      .pill{
        display:none;
      }

      .file-line{
        display:grid;
        grid-template-columns:76px 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="top">
      <div class="hero">
        <div>
          <h1 id="title">卡片背题</h1>
          <div class="sub" id="subtitle">自动读取同目录 JSON 题库</div>
        </div>
        <div class="pill" id="countPill">0 题</div>
      </div>

      <div class="panel">
        <div class="row">
          <select id="bankSelect" aria-label="选择题库"></select>
          <button id="reloadBtn">刷新</button>
        </div>

        <input id="search" type="search" placeholder="搜索题目 / 答案关键词" />

        <div class="mini-actions">
          <button class="toggle" id="alwaysAnswerBtn" type="button">
            <span>答案常显</span>
            <i class="switch"></i>
          </button>
          <button class="toggle" id="studyModeBtn" type="button">
            <span>背诵模式</span>
            <i class="switch"></i>
          </button>
        </div>

        <div class="tabs" id="tabs"></div>

        <div class="file-line">
          <span>本地预览：</span>
          <input id="fileInput" type="file" accept=".json,application/json" />
        </div>
      </div>
    </section>

    <div class="status">
      <span id="progressText">0 / 0</span>
      <div class="bar"><span id="bar"></span></div>
    </div>

    <section class="card" id="card"></section>
  </main>

  <nav class="bottom">
    <div class="bottom-inner">
      <button id="prevBtn">上一题</button>
      <button class="primary" id="showBtn">显示答案</button>
      <button id="nextBtn">下一题</button>
    </div>
  </nav>

  <div class="toast" id="toast"></div>

<script>
const DEFAULT_JSON = '计组.json';
const BANKS_JSON = 'banks.json';

let banks = [];
let rawItems = [];
let filtered = [];
let current = 0;
let activeType = '全部';
let answerVisible = false;
let bankKey = 'local';

let alwaysShowAnswer = localStorage.getItem('alwaysShowAnswer') === '1';
let studyMode = localStorage.getItem('studyMode') === '1';

const $ = id => document.getElementById(id);

function esc(s=''){
  return String(s).replace(/[&<>"]/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;'
  }[m]));
}

function norm(s=''){
  return String(s).toLowerCase().replace(/\s+/g,'');
}

function toast(msg){
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => el.classList.remove('show'), 1200);
}

function normalizeData(data){
  if(Array.isArray(data)){
    return {
      meta:{title:'JSON题库'},
      items:data
    };
  }

  if(data && Array.isArray(data.items)){
    return {
      meta:data.meta || {},
      items:data.items
    };
  }

  if(data && Array.isArray(data.questions)){
    return {
      meta:data.meta || {},
      items:data.questions
    };
  }

  if(data && Array.isArray(data.banks)){
    const items = [];
    data.banks.forEach((b, bi) => {
      (b.items || b.questions || []).forEach((it, ii) => {
        items.push({
          ...it,
          id:it.id ?? `${bi + 1}-${ii + 1}`,
          bankTitle:b.title || b.name || ''
        });
      });
    });

    return {
      meta:data.meta || {title:'多题库合集'},
      items
    };
  }

  throw new Error('JSON格式不识别：请使用数组，或 { meta, items:[...] }');
}

function normalizeBanks(list){
  if(!Array.isArray(list)){
    throw new Error('banks.json 必须是数组');
  }

  return list.map(item => {
    if(typeof item === 'string'){
      return {
        name:item.replace(/\.json$/i,''),
        url:item
      };
    }

    return {
      name:item.name || item.title || item.url,
      url:item.url
    };
  }).filter(item => item.url);
}

function mergeBanks(...groups){
  const map = new Map();

  groups.flat().forEach(item => {
    if(!item || !item.url) return;

    const key = item.url;

    if(!map.has(key)){
      map.set(key, item);
    }
  });

  return Array.from(map.values());
}

async function discoverGitHubJson(){
  const host = location.hostname;

  if(!host.endsWith('github.io')){
    return [];
  }

  const owner = host.split('.')[0];
  const parts = location.pathname.split('/').filter(Boolean);

  let repo;
  let dirParts;

  if(parts.length === 0){
    repo = `${owner}.github.io`;
    dirParts = [];
  }else{
    repo = parts[0];
    dirParts = parts.slice(1);
  }

  if(dirParts.length && dirParts[dirParts.length - 1].includes('.')){
    dirParts.pop();
  }

  const api = `https://api.github.com/repos/${owner}/${repo}/contents/${dirParts.join('/')}`;
  const res = await fetch(api,{cache:'no-store'});

  if(!res.ok){
    throw new Error('GitHub API 不可用');
  }

  const list = await res.json();

  return list
    .filter(f =>
      f.type === 'file' &&
      /\.json$/i.test(f.name) &&
      f.name !== BANKS_JSON &&
      !/^package(-lock)?\.json$/i.test(f.name)
    )
    .map(f => ({
      name:f.name.replace(/\.json$/i,''),
      url:f.name
    }));
}

function storageKey(type,item){
  return `${type}:${bankKey}:${item.id}`;
}

function isMastered(item){
  return localStorage.getItem(storageKey('mastered',item)) === '1';
}

function setMastered(item,val){
  const key = storageKey('mastered',item);
  if(val) localStorage.setItem(key,'1');
  else localStorage.removeItem(key);
}

function saveProgress(){
  if(!bankKey) return;
  localStorage.setItem(`progress:${bankKey}`, String(current));
}

function loadProgress(){
  const saved = Number(localStorage.getItem(`progress:${bankKey}`) || 0);
  if(Number.isFinite(saved) && saved >= 0 && saved < filtered.length){
    current = saved;
  }
}

function setHeader(){
  const meta = window.currentMeta || {};
  $('title').textContent = meta.title || '卡片背题';

  $('subtitle').textContent = [
    meta.book,
    meta.isbn ? `ISBN：${meta.isbn}` : ''
  ].filter(Boolean).join(' · ') || '读取题库文件';

  $('countPill').textContent = `${rawItems.length} 题`;
  $('alwaysAnswerBtn').classList.toggle('active', alwaysShowAnswer);
  $('studyModeBtn').classList.toggle('active', studyMode);
}

function buildTabs(){
  const types = ['全部', ...Array.from(new Set(rawItems.map(x => x.type || '未分类')))];
  $('tabs').innerHTML = types.map(t => `
    <button class="tab ${t === activeType ? 'active' : ''}" data-type="${esc(t)}">
      ${esc(t)}
    </button>
  `).join('');

  $('tabs').querySelectorAll('.tab').forEach(btn => {
    btn.onclick = () => {
      activeType = btn.dataset.type;
      current = 0;
      answerVisible = alwaysShowAnswer;
      applyFilter();
    };
  });
}

function applyFilter(keepProgress=false){
  const keyword = norm($('search').value);

  filtered = rawItems.filter(item => {
    const typeOk = activeType === '全部' || (item.type || '未分类') === activeType;
    const textOk = !keyword || norm(`${item.q || ''} ${item.a || ''} ${item.answer || ''} ${item.desc || ''}`).includes(keyword);
    return typeOk && textOk;
  });

  if(keepProgress) loadProgress();

  if(current >= filtered.length){
    current = Math.max(0, filtered.length - 1);
  }

  buildTabs();
  render();
}

function visibleAnswer(){
  return alwaysShowAnswer || answerVisible;
}

function render(){
  setHeader();

  const total = filtered.length;
  $('progressText').textContent = total ? `${current + 1} / ${total}` : '0 / 0';
  $('bar').style.width = total ? `${((current + 1) / total) * 100}%` : '0%';

  const show = visibleAnswer();
  $('showBtn').textContent = show ? '隐藏答案' : '显示答案';

  if(!total){
    $('card').innerHTML = `
      <div class="empty">
        没有匹配的题目<br>
        换个分类或关键词试试
      </div>
    `;
    return;
  }

  const item = filtered[current];
  const mastered = isMastered(item);

  $('card').innerHTML = `
    <div>
      <div class="badge-row">
        <div class="badge">${esc(item.type || '未分类')}</div>
        <div class="small-tip">${show ? '点卡片隐藏答案' : '点卡片显示答案'}</div>
      </div>

      <div class="q">${esc(item.q || '')}</div>

      <div class="answer ${show ? 'show' : ''}">
        <div class="ans-title">答案</div>
        <div class="ans-text">${esc(item.a || item.answer || '')}</div>
        ${item.desc ? `<div class="desc">${esc(item.desc)}</div>` : ''}
      </div>
    </div>

    <div class="tools">
      <button class="master ${mastered ? 'active' : ''}" id="masterBtn">
        ${mastered ? '已掌握' : '掌握'}
      </button>
      <button id="randomBtn">随机</button>
    </div>
  `;

  $('masterBtn').onclick = e => {
    e.stopPropagation();
    setMastered(item,!mastered);
    render();
  };

  $('randomBtn').onclick = e => {
    e.stopPropagation();
    randomCard();
  };

  saveProgress();
}

function prev(){
  if(!filtered.length) return;
  current = (current - 1 + filtered.length) % filtered.length;
  answerVisible = alwaysShowAnswer;
  render();
}

function next(){
  if(!filtered.length) return;
  current = (current + 1) % filtered.length;
  answerVisible = alwaysShowAnswer;
  render();
}

function randomCard(){
  if(!filtered.length) return;
  current = Math.floor(Math.random() * filtered.length);
  answerVisible = alwaysShowAnswer;
  render();
}

function toggleAnswer(){
  if(alwaysShowAnswer){
    alwaysShowAnswer = false;
    localStorage.setItem('alwaysShowAnswer','0');
    answerVisible = false;
    toast('已关闭答案常显');
  }else{
    answerVisible = !answerVisible;
  }

  render();
}

async function setupBanks(){
  const param = new URLSearchParams(location.search).get('bank');

  if(param){
    banks = [
      {
        name:param.replace(/\.json$/i,''),
        url:param
      }
    ];
  }else{
    let banksFromList = [];
    let banksFromGithub = [];

    try{
      const res = await fetch(`${BANKS_JSON}?_=${Date.now()}`, {
        cache:'no-store'
      });

      if(res.ok){
        const list = await res.json();
        banksFromList = normalizeBanks(list);
      }
    }catch(e){
      banksFromList = [];
    }

    try{
      banksFromGithub = await discoverGitHubJson();
    }catch(e){
      banksFromGithub = [];
    }

    banks = mergeBanks(banksFromList, banksFromGithub);

    if(!banks.length){
      banks = [
        {
          name:'计组',
          url:DEFAULT_JSON
        }
      ];
    }
  }

  $('bankSelect').innerHTML = banks.map((b,i) => `
    <option value="${i}">${esc(b.name)}</option>
  `).join('');

  const last = localStorage.getItem('lastBankName');
  const idx = banks.findIndex(b => b.name === last || b.url === last);

  $('bankSelect').value = idx >= 0 ? idx : 0;

  await loadBank(banks[$('bankSelect').value], true);
}

async function loadBank(bank,keepProgress=false){
  try{
    bankKey = bank.name || bank.url || 'local';
    localStorage.setItem('lastBankName', bank.name || bank.url || '');

    const url = bank.url + (bank.url.includes('?') ? '&' : '?') + '_=' + Date.now();
    const res = await fetch(url,{cache:'no-store'});

    if(!res.ok){
      throw new Error(`读取失败：${bank.url}`);
    }

    const data = await res.json();
    const normalized = normalizeData(data);

    window.currentMeta = normalized.meta || {};
    rawItems = normalized.items.map((it,i) => ({
      id:it.id ?? i + 1,
      ...it
    }));

    current = 0;
    answerVisible = alwaysShowAnswer;
    activeType = '全部';

    applyFilter(keepProgress);
  }catch(err){
    rawItems = [];
    filtered = [];

    $('card').innerHTML = `
      <div class="empty">
        题库读取失败<br>
        ${esc(err.message)}<br><br>
        请确认 JSON 与 HTML 放在同一目录，或用“本地预览”选择 JSON。
      </div>
    `;

    setHeader();
    buildTabs();
  }
}

$('prevBtn').onclick = prev;
$('nextBtn').onclick = next;
$('showBtn').onclick = toggleAnswer;

$('reloadBtn').onclick = () => {
  loadBank(banks[$('bankSelect').value], true);
};

$('bankSelect').onchange = () => {
  loadBank(banks[$('bankSelect').value], true);
};

$('search').oninput = () => {
  current = 0;
  answerVisible = alwaysShowAnswer;
  applyFilter();
};

$('alwaysAnswerBtn').onclick = () => {
  alwaysShowAnswer = !alwaysShowAnswer;
  localStorage.setItem('alwaysShowAnswer', alwaysShowAnswer ? '1' : '0');
  answerVisible = alwaysShowAnswer;
  render();
};

$('studyModeBtn').onclick = () => {
  studyMode = !studyMode;
  localStorage.setItem('studyMode', studyMode ? '1' : '0');
  toast(studyMode ? '背诵模式已开' : '背诵模式已关');
  render();
};

$('fileInput').onchange = async e => {
  const file = e.target.files && e.target.files[0];
  if(!file) return;

  try{
    const text = await file.text();
    const normalized = normalizeData(JSON.parse(text));

    window.currentMeta = normalized.meta || {title:file.name};
    bankKey = file.name;

    rawItems = normalized.items.map((it,i) => ({
      id:it.id ?? i + 1,
      ...it
    }));

    current = 0;
    answerVisible = alwaysShowAnswer;
    activeType = '全部';

    applyFilter();
  }catch(err){
    toast('JSON读取失败');
  }
};

$('card').addEventListener('click', e => {
  if(e.target.closest('button')) return;
  if(!filtered.length) return;

  if(studyMode){
    if(!visibleAnswer()){
      answerVisible = true;
      render();
    }else{
      next();
    }
    return;
  }

  if(!alwaysShowAnswer){
    answerVisible = !answerVisible;
    render();
  }
});

document.addEventListener('keydown', e => {
  if(e.key === 'ArrowLeft') prev();
  if(e.key === 'ArrowRight') next();

  if(e.key === ' '){
    e.preventDefault();
    toggleAnswer();
  }

  if(e.key.toLowerCase() === 'r'){
    randomCard();
  }
});

let touchStartX = 0;
let touchStartY = 0;

$('card').addEventListener('touchstart', e => {
  const t = e.changedTouches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
},{passive:true});

$('card').addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;

  if(Math.abs(dx) < 55 || Math.abs(dx) < Math.abs(dy) * 1.2) return;

  if(dx < 0) next();
  else prev();
},{passive:true});

setupBanks();
</script>
</body>
</html>
